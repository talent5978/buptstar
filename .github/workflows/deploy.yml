name: Auto Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy
      run: |
        cd /var/www/buptstar-web
        
        # 拉取最新代码
        git pull origin main
        
        # 更新前端依赖
        npm install
        
        # 更新后端依赖
        cd backend && npm install && cd ..
        
        # 构建前端
        npm run build
        
        # 重启后端服务
        pm2 restart buptstar-backend
        
        # 查看服务状态
        pm2 status
        
        echo "部署完成！"
